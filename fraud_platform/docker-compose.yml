version: '3.8'

services:
  # ---- ETL 数据管道 ----
  etl:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-etl
    command: python etl_pipeline.py
    volumes:
      - ../creditcard.csv:/data/creditcard.csv:ro
      - processed_data:/app/processed_data
    restart: on-failure
    networks:
      - fraud-net

  # ---- 模型训练服务 ----
  trainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-trainer
    command: python detection_engine.py
    volumes:
      - ../creditcard.csv:/data/creditcard.csv:ro
      - model_data:/app/models
    restart: on-failure
    networks:
      - fraud-net

  # ---- 实时检测引擎 ----
  detector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-detector
    command: python main.py --dashboard
    ports:
      - "8080:8080"
    volumes:
      - ../creditcard.csv:/data/creditcard.csv:ro
      - model_data:/app/models:ro
    restart: unless-stopped
    networks:
      - fraud-net
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- 可视化仪表板 ----
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud-dashboard
    command: python -c "
import time
while True:
    print('仪表板运行中... 节点: 4/4 OK | 今日处理: -- | CPU: --%')
    time.sleep(10)
"
    ports:
      - "3000:3000"
    networks:
      - fraud-net

volumes:
  processed_data:
  model_data:

networks:
  fraud-net:
    driver: bridge
